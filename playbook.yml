- name: Deploy Laravel Application
  hosts: i4cserver
  become: yes
  vars:
    deploy_user: root
    app_path: /var/www/SokhomPanha
    github_repo: https://github.com/SokhomPanha/-i42026-website-.git

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
      when: ansible_os_family == "Debian"

    - name: Install required packages
      apt:
        name:
          - nginx
          - php8.2-fpm
          - php8.2-mysql
          - php8.2-cli
          - php8.2-xml
          - php8.2-mbstring
          - php8.2-curl
          - php8.2-zip
          - unzip
          - git
        state: present

    - name: Create deployment directory
      file:
        path: "{{ app_path }}"
        state: directory
        mode: '0755'

    - name: Configure git safe directory
      shell: git config --global --add safe.directory {{ app_path }}
      ignore_errors: yes

    - name: Clone Laravel repository
      git:
        repo: "{{ github_repo }}"
        dest: "{{ app_path }}"
        force: yes
    - name: Install Composer
      shell: |
        curl -sS https://getcomposer.org/installer | php
        mv composer.phar /usr/local/bin/composer
        chmod +x /usr/local/bin/composer

    - name: Install Laravel dependencies
      shell: |
        cd {{ app_path }}
        composer install --no-interaction --prefer-dist --optimize-autoloader

    - name: Create .env file
      template:
        src: .env.j2
        dest: "{{ app_path }}/.env"
      ignore_errors: yes

    - name: Generate application key
      shell: |
        cd {{ app_path }}
        php artisan key:generate --force
      ignore_errors: yes

    - name: Set permissions
      shell: |
        chmod -R 755 {{ app_path }}
        chmod -R 775 {{ app_path }}/storage
        chmod -R 775 {{ app_path }}/bootstrap/cache
      ignore_errors: yes

    - name: Enable Laravel site
      file:
        src: /etc/nginx/sites-available/laravel
        dest: /etc/nginx/sites-enabled/laravel
        state: link
      notify: Restart Nginx

    - name: Remove default nginx site
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent
      notify: Restart Nginx

    - name: Test nginx configuration
      shell: nginx -t
      notify: Restart Nginx

  handlers:
    - name: Restart Nginx
      service:
        name: nginx
        state: restarted